<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HR Login - Smart Recruiter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1a1a2e; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 25px; }
        label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 5px; color: #374151; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 15px; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        .error { background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Smart Recruiter</h1>
        <p>HR Portal — Sign in to continue</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="hr@company.com" required/>
            <label>Password</label>
            <input type="password" name="password" placeholder="Your password" required/>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
