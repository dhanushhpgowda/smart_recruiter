<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Recruiter{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        .navbar {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo { color: white; font-size: 20px; font-weight: bold; text-decoration: none; }
        .navbar .nav-links a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .navbar .nav-links a:hover { color: white; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn-secondary:hover { background: #4b5563; }
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-gray { background: #f3f4f6; color: #374151; }
        h1 { font-size: 24px; margin-bottom: 5px; }
        h2 { font-size: 20px; margin-bottom: 15px; }
        h3 { font-size: 16px; margin-bottom: 10px; }
        p { color: #6b7280; font-size: 14px; line-height: 1.6; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; background: #f9fafb; font-size: 13px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
        tr:hover td { background: #f9fafb; }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus { outline: none; border-color: #4f46e5; }
        label { font-size: 13px; font-weight: 500; margin-bottom: 5px; display: block; color: #374151; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-number { font-size: 36px; font-weight: bold; color: #4f46e5; }
        .stat-label { font-size: 13px; color: #6b7280; margin-top: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/hr/dashboard" class="logo">Smart Recruiter</a>
        <div class="nav-links">
            <a href="/hr/dashboard">Dashboard</a>
            <a href="/hr/jobs">Jobs</a>
            <a href="/hr/logout">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
